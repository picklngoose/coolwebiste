    lines.forEach(({ cls, msg }, i) => {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'entry ' + cls;
        el.textContent = msg;
        log.appendChild(el);
        log.scrollTop = log.scrollHeight;
        done++;
        bar.style.width = Math.min(100, (done / lines.length) * 100) + '%';
        if (done === lines.length - 1) status.textContent = 'uploading complete — disconnecting...';
        if (done === lines.length) status.textContent = 'connection closed.';
      }, 150 * i + 100);
    });

    const types = [
      { ext:'txt', mime:'text/plain', gen: i => `file ${i}` },
      { ext:'csv', mime:'text/csv',   gen: i => `id,val\n${i},${Math.random()}` },
    ];
    let dc = 0;
    function dl() {
      if (dc >= 150) return;
      const t = types[dc % 2];
      const name = fakeFiles[dc % fakeFiles.length].replace(/\.[^.]+$/, '.'+t.ext);
      const a = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(new Blob([t.gen(dc)], {type: t.mime})),
        download: name
      });
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      dc++; setTimeout(dl, 250);
    }
